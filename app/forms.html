<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórias</title>
    <link rel="stylesheet" href="./style/forms.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=auto_stories" />
    <script src="./scripts/menu.js" defer></script>
    <script type="module" src="./scripts/form.js"></script>

</head>

<body>
    <div id="container">
        <header>
            <img src="./images/navio.jpg" alt="" />
            <a class="link-do-cabecalho" href="index.html">Viajei</a>
            <a class="link-do-cabecalho" href="./about.html">Sobre</a>
            <a class="link-do-cabecalho" href="forms.html">Histórias</a>
            <div class="toggle"></div>
        </header>

        <section>
                <form id="post-form">

                <h1>Deixe uma história: <span class="material-symbols-outlined">
                        auto_stories
                    </span></h1>

                <label for="autor">Autor</label>
                <input type="text" id="autor" name="autor" placeholder="ex:felipe"> 

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="ex:felipe.new@exemple.com">

                 <label for="titulo">Título</label>
                <input type="text" id="titulo" name="titulo" placeholder="ex:Meu dia"> 

                <label for="história">História</label>
                <textarea name="historia" id="historia" cols="30" rows="10"  placeholder="ex:Meu dia hoje foi..."></textarea>

                <button type="submit"> Enviar </button>
                
               
            </form>

        </section>

        <dialog id="modal">
         <button autofocus>Fechar</button>
         <div id="modal-content"></div>
        </dialog>

        <footer>
            <div id="historias"></div>
        </footer>

</body>

</html>
